<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiwi — V43 — Sign In Flow (Tablet)</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    html, body { background: #fff; }
    .variant { display: flex !important; flex-direction: row !important; min-height: 100vh; align-items: center; justify-content: center; padding: 60px 40px; gap: 64px; background: #fff !important; }
    .phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 30px; }
    .phone-label { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 400; color: #111827; }

    /* Fix tablet screen height for both frames */
    .android-tablet-frame .tablet-screen { height: 790px; min-height: unset; }

    /* Keyboard */
    .kbd { position: absolute; bottom: 0; left: 0; right: 0; background: #F2F4F4; padding: 8px 0 10px; }
    .kbd-row { display: flex; gap: 5px; padding: 0 6px; margin-bottom: 5px; }
    .kbd-row:last-child { margin-bottom: 0; }
    .kbd-key { flex: 1; height: 44px; background: #fff; border-radius: 5px; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 1px 0 rgba(0,0,0,0.18); }
    .kbd-spec { background: #DCDFE4; }
    .kbd-purple { background: #7247EC; }
    .kbd-letter { font-family: 'DM Sans', sans-serif; font-size: 17px; color: #101010; line-height: 1; }
    .kbd-num { position: absolute; top: 4px; right: 5px; font-family: 'DM Sans', sans-serif; font-size: 10px; color: #9191A1; line-height: 1; }
  </style>
</head>
<body>
  <div class="variant active" data-variant-id="sign-in-tablet-v43">

    <!-- ── Screen 1: Sign In ── -->
    <div class="phone-wrap">
      <span class="phone-label">Sign In</span>
      <div class="android-tablet-frame">
        <div class="btn-side btn-tablet-vol-up"></div>
        <div class="btn-side btn-tablet-vol-dn"></div>
        <div class="btn-side btn-tablet-power"></div>
        <div class="tablet-inner">
          <div class="tablet-status">
            <span class="android-time">9:41</span>
            <div class="android-icons">
              <svg width="15" height="10" viewBox="0 0 15 10" fill="#fff"><rect x="0" y="5" width="2.5" height="5" rx="0.5"/><rect x="3.5" y="3" width="2.5" height="7" rx="0.5"/><rect x="7" y="1" width="2.5" height="9" rx="0.5"/><rect x="10.5" y="0" width="2.5" height="10" rx="0.5"/></svg>
              <svg width="16" height="12" viewBox="0 0 20 14" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"><path d="M1 10C4 7 7 5.5 10 5.5C13 5.5 16 7 19 10"/><path d="M4 12.5C6.5 10 8.5 9 10 9C11.5 9 13.5 10 16 12.5"/><circle cx="10" cy="14" r="1.2" fill="#fff" stroke="none"/></svg>
              <svg width="22" height="11" viewBox="0 0 22 11" fill="none"><rect x="0.5" y="0.5" width="19" height="10" rx="2" stroke="#fff"/><rect x="1.5" y="1.5" width="14" height="8" rx="1.5" fill="#fff"/><path d="M20.5 3.5v4a2 2 0 0 0 0-4z" fill="#fff"/></svg>
            </div>
          </div>

          <div class="tablet-screen" style="display:flex;flex-direction:column;align-items:center;">
            <!-- Kiwichat logo -->
            <img src="https://www.figma.com/api/mcp/asset/f46f14bc-73fd-4954-840d-2590a416f9db"
                 style="width:208px;height:32px;object-fit:contain;flex-shrink:0;margin-top:58px;" alt="kiwichat" />

            <!-- Illustration -->
            <img src="https://www.figma.com/api/mcp/asset/f4ad9a02-c0d9-4f1e-bc80-2429d3e59ef4"
                 style="width:280px;height:287px;object-fit:contain;flex-shrink:0;margin-top:86px;" alt="" />

            <!-- Subtitle -->
            <p style="margin-top:56px;font-family:'DM Sans',sans-serif;font-size:20px;font-weight:400;color:#101010;line-height:28px;text-align:center;flex-shrink:0;">Chat with your friends and family</p>

            <div style="flex:1;"></div>

            <!-- CTA button -->
            <div style="width:280px;height:48px;background:#7247EC;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:48px;">
              <span style="font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;color:#fff;line-height:24px;">Sign in with Kiwichat</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Screen 2: Enter ID (Portrait) ── -->
    <div class="phone-wrap">
      <span class="phone-label">Enter ID</span>
      <div class="android-tablet-frame">
        <div class="btn-side btn-tablet-vol-up"></div>
        <div class="btn-side btn-tablet-vol-dn"></div>
        <div class="btn-side btn-tablet-power"></div>
        <div class="tablet-inner">
          <div class="tablet-status">
            <span class="android-time">9:41</span>
            <div class="android-icons">
              <svg width="15" height="10" viewBox="0 0 15 10" fill="#fff"><rect x="0" y="5" width="2.5" height="5" rx="0.5"/><rect x="3.5" y="3" width="2.5" height="7" rx="0.5"/><rect x="7" y="1" width="2.5" height="9" rx="0.5"/><rect x="10.5" y="0" width="2.5" height="10" rx="0.5"/></svg>
              <svg width="16" height="12" viewBox="0 0 20 14" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"><path d="M1 10C4 7 7 5.5 10 5.5C13 5.5 16 7 19 10"/><path d="M4 12.5C6.5 10 8.5 9 10 9C11.5 9 13.5 10 16 12.5"/><circle cx="10" cy="14" r="1.2" fill="#fff" stroke="none"/></svg>
              <svg width="22" height="11" viewBox="0 0 22 11" fill="none"><rect x="0.5" y="0.5" width="19" height="10" rx="2" stroke="#fff"/><rect x="1.5" y="1.5" width="14" height="8" rx="1.5" fill="#fff"/><path d="M20.5 3.5v4a2 2 0 0 0 0-4z" fill="#fff"/></svg>
            </div>
          </div>

          <div class="tablet-screen">

            <!-- Sign-in card — centered (550px screen: (550-394)/2 = 78px) -->
            <div style="position:absolute;top:40px;left:78px;width:394px;height:274px;border:1px solid #DADAE2;border-radius:12px;overflow:hidden;background:#fff;">
              <!-- Card header -->
              <div style="height:36px;display:flex;align-items:center;gap:8px;padding:0 15px;border-bottom:1px solid #DADAE2;">
                <img src="https://www.figma.com/api/mcp/asset/179f305d-a777-4415-9e7d-63d2f1292e5a"
                     style="width:16px;height:16px;object-fit:contain;flex-shrink:0;" alt="" />
                <span style="font-family:'DM Sans',sans-serif;font-size:12px;color:#686873;line-height:20px;">Sign in with Kiwichat</span>
              </div>
              <!-- Card body -->
              <div style="display:flex;flex-direction:column;align-items:center;">
                <p style="margin-top:44px;font-family:'DM Sans',sans-serif;font-size:20px;font-weight:400;color:#101010;line-height:28px;">Sign in</p>
                <div style="margin-top:24px;display:flex;flex-direction:column;gap:24px;align-items:center;">
                  <!-- Your ID input -->
                  <div style="position:relative;width:298px;height:48px;border:1px solid #7247EC;border-radius:8px;">
                    <div style="position:absolute;top:-11px;left:11px;background:#fff;padding:0 4px;">
                      <span style="font-family:'DM Sans',sans-serif;font-size:12px;color:#7247EC;line-height:20px;">Your ID</span>
                    </div>
                    <span style="position:absolute;left:15px;top:50%;transform:translateY(-50%);font-family:'DM Sans',sans-serif;font-size:16px;color:#101010;line-height:24px;">157532</span>
                  </div>
                  <!-- Next button -->
                  <div style="width:298px;height:48px;background:#7247EC;border-radius:8px;display:flex;align-items:center;justify-content:center;">
                    <span style="font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;color:#fff;line-height:24px;">Next</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- Android Tablet Keyboard -->
            <div class="kbd">
              <!-- Row 1: q–p + backspace -->
              <div class="kbd-row">
                <div class="kbd-key"><span class="kbd-num">1</span><span class="kbd-letter">q</span></div>
                <div class="kbd-key"><span class="kbd-num">2</span><span class="kbd-letter">w</span></div>
                <div class="kbd-key"><span class="kbd-num">3</span><span class="kbd-letter">e</span></div>
                <div class="kbd-key"><span class="kbd-num">4</span><span class="kbd-letter">r</span></div>
                <div class="kbd-key"><span class="kbd-num">5</span><span class="kbd-letter">t</span></div>
                <div class="kbd-key"><span class="kbd-num">6</span><span class="kbd-letter">y</span></div>
                <div class="kbd-key"><span class="kbd-num">7</span><span class="kbd-letter">u</span></div>
                <div class="kbd-key"><span class="kbd-num">8</span><span class="kbd-letter">i</span></div>
                <div class="kbd-key"><span class="kbd-num">9</span><span class="kbd-letter">o</span></div>
                <div class="kbd-key"><span class="kbd-num">0</span><span class="kbd-letter">p</span></div>
                <div class="kbd-key kbd-spec" style="flex:1.2;">
                  <svg width="20" height="15" viewBox="0 0 22 17" fill="none"><path d="M8 1h13a1 1 0 011 1v13a1 1 0 01-1 1H8L1 8.5 8 1z" stroke="#101010" stroke-width="1.4" stroke-linejoin="round"/><path d="M14 6l-6 5M8 6l6 5" stroke="#101010" stroke-width="1.4" stroke-linecap="round"/></svg>
                </div>
              </div>
              <!-- Row 2: a–l + Return (purple) -->
              <div class="kbd-row" style="padding-left:22px;padding-right:6px;">
                <div class="kbd-key"><span class="kbd-letter">a</span></div>
                <div class="kbd-key"><span class="kbd-letter">s</span></div>
                <div class="kbd-key"><span class="kbd-letter">d</span></div>
                <div class="kbd-key"><span class="kbd-letter">f</span></div>
                <div class="kbd-key"><span class="kbd-letter">g</span></div>
                <div class="kbd-key"><span class="kbd-letter">h</span></div>
                <div class="kbd-key"><span class="kbd-letter">j</span></div>
                <div class="kbd-key"><span class="kbd-letter">k</span></div>
                <div class="kbd-key"><span class="kbd-letter">l</span></div>
                <div class="kbd-key kbd-purple" style="flex:1.4;">
                  <svg width="18" height="14" viewBox="0 0 18 14" fill="none"><path d="M17 1V6c0 1.1-.9 2-2 2H1M1 8l4-4M1 8l4 4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
              </div>
              <!-- Row 3: Shift z–. Shift -->
              <div class="kbd-row">
                <div class="kbd-key kbd-spec" style="flex:1.3;">
                  <svg width="20" height="16" viewBox="0 0 22 18" fill="none"><path d="M11 1L1 9h4v8h12V9h4L11 1z" stroke="#061D28" stroke-width="1.5" stroke-linejoin="round"/></svg>
                </div>
                <div class="kbd-key"><span class="kbd-letter">z</span></div>
                <div class="kbd-key"><span class="kbd-letter">x</span></div>
                <div class="kbd-key"><span class="kbd-letter">c</span></div>
                <div class="kbd-key"><span class="kbd-letter">v</span></div>
                <div class="kbd-key"><span class="kbd-letter">b</span></div>
                <div class="kbd-key"><span class="kbd-letter">n</span></div>
                <div class="kbd-key"><span class="kbd-letter">m</span></div>
                <div class="kbd-key"><span class="kbd-letter">,</span></div>
                <div class="kbd-key"><span class="kbd-letter">.</span></div>
                <div class="kbd-key kbd-spec" style="flex:1.3;">
                  <svg width="20" height="16" viewBox="0 0 22 18" fill="none"><path d="M11 1L1 9h4v8h12V9h4L11 1z" stroke="#061D28" stroke-width="1.5" stroke-linejoin="round"/></svg>
                </div>
              </div>
              <!-- Row 4: ?!# emoji space return -->
              <div class="kbd-row">
                <div class="kbd-key kbd-spec" style="flex:1.4;">
                  <span style="font-family:'DM Sans',sans-serif;font-size:13px;color:#101010;">?!#</span>
                </div>
                <div class="kbd-key kbd-spec">
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8.5" stroke="#101010" stroke-width="1.3"/><circle cx="7" cy="8.5" r="1.2" fill="#101010"/><circle cx="13" cy="8.5" r="1.2" fill="#101010"/><path d="M6 13c1.1 1.3 6.9 1.3 8 0" stroke="#101010" stroke-width="1.3" stroke-linecap="round"/></svg>
                </div>
                <div class="kbd-key" style="flex:4;background:rgba(6,29,40,0.12);"></div>
                <div class="kbd-key kbd-spec" style="flex:1.4;">
                  <span style="font-family:'DM Sans',sans-serif;font-size:12px;color:#101010;">return</span>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
