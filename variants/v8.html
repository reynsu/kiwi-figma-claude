<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiwi — V8 — Empty State</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    body { background: #fff; }
    .variant { display: flex !important; min-height: 100vh; align-items: center; justify-content: center; padding: 40px; }
  </style>
</head>
<body>
  <div class="variant active" data-variant-id="chats-empty-state-android-v8">
    <div class="android-frame">
      <div class="btn-side btn-vol-up"></div>
      <div class="btn-side btn-vol-dn"></div>
      <div class="btn-side btn-power"></div>
      <div class="android-inner">

        <!-- Status bar -->
        <div class="android-status">
          <span class="android-time">9:41</span>
          <div class="android-icons">
            <svg width="15" height="10" viewBox="0 0 15 10" fill="#fff">
              <rect x="0" y="5" width="2.5" height="5" rx="0.5"/>
              <rect x="3.5" y="3" width="2.5" height="7" rx="0.5"/>
              <rect x="7" y="1" width="2.5" height="9" rx="0.5"/>
              <rect x="10.5" y="0" width="2.5" height="10" rx="0.5"/>
            </svg>
            <svg width="16" height="12" viewBox="0 0 20 14" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round">
              <path d="M1 10C4 7 7 5.5 10 5.5C13 5.5 16 7 19 10"/>
              <path d="M4 12.5C6.5 10 8.5 9 10 9C11.5 9 13.5 10 16 12.5"/>
              <circle cx="10" cy="14" r="1.2" fill="#fff" stroke="none"/>
            </svg>
            <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
              <rect x="0.5" y="0.5" width="19" height="10" rx="2" stroke="#fff"/>
              <rect x="1.5" y="1.5" width="14" height="8" rx="1.5" fill="#fff"/>
              <path d="M20.5 3.5v4a2 2 0 0 0 0-4z" fill="#fff"/>
            </svg>
          </div>
        </div>

        <!-- Screen -->
        <div class="android-screen" style="background:#fff;font-family:'DM Sans',system-ui,sans-serif;min-height:760px;position:relative;">

          <!-- Header -->
          <div style="position:absolute;top:0;left:0;right:0;height:56px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;align-items:center;padding:0 16px;gap:8px;">
            <img src="https://www.figma.com/api/mcp/asset/21e447a9-5954-43e3-9230-d6a515a334a5" alt="" style="width:24px;height:24px;object-fit:contain;" />
            <span style="font-size:20px;font-weight:700;line-height:28px;color:#101010;">Chats</span>
          </div>

          <!-- Empty state (vertically centered) -->
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:24px;text-align:center;width:328px;">
            <img src="https://www.figma.com/api/mcp/asset/8f4fc61a-a743-43bb-9867-88ae90020764" alt="" style="width:220px;height:139px;object-fit:contain;" />
            <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
              <p style="font-size:20px;font-weight:700;line-height:28px;color:#101010;">No chats yet</p>
              <p style="font-size:16px;font-weight:400;line-height:24px;color:#686873;">Start by adding your first contact</p>
            </div>
          </div>

          <!-- FAB — Add contact -->
          <div style="position:absolute;bottom:72px;right:16px;background:#7247EC;border-radius:999px;padding:12px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;">
            <img src="https://www.figma.com/api/mcp/asset/c05bb21c-98d6-4fec-b185-a069b7c5b0e8" alt="" style="width:24px;height:24px;object-fit:contain;filter:brightness(0) invert(1);" />
            <span style="font-size:14px;font-weight:500;line-height:22px;color:#fff;white-space:nowrap;">Add contact</span>
          </div>

          <!-- Tab bar -->
          <div style="position:absolute;bottom:0;left:0;right:0;border-top:1px solid #F2F4F4;background:#fff;display:flex;">
            <!-- Chats tab (active) -->
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;">
              <img src="https://www.figma.com/api/mcp/asset/316b472f-2f9a-43af-9fa9-fc049431d3c6" alt="" style="width:24px;height:24px;object-fit:contain;" />
              <span style="font-size:10px;font-weight:400;line-height:16px;color:#7247EC;">Chats</span>
            </div>
            <!-- Settings tab (inactive) -->
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;">
              <img src="https://www.figma.com/api/mcp/asset/6ef9cb04-6f29-40b8-b8ac-d648b546698f" alt="" style="width:24px;height:24px;object-fit:contain;" />
              <span style="font-size:10px;font-weight:400;line-height:16px;color:#9191A1;">Settings</span>
            </div>
          </div>

        </div><!-- /android-screen -->

        <div class="home-bar"><div class="home-bar-pill"></div></div>
      </div><!-- /android-inner -->
    </div><!-- /android-frame -->
  </div>
</body>
</html>
