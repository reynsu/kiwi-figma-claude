<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiwi — V5 — Photo+Voice Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    body { background: #fff; }
    .variant { display: flex !important; min-height: 100vh; align-items: center; justify-content: center; padding: 40px; }
    .chat-screen {
      background-image: url('../chat-bg-pattern.png') !important;
      background-size: 360px auto !important;
      background-repeat: repeat !important;
    }
  </style>
</head>
<body>
  <div class="variant active" data-variant-id="chat-photo-voice-v5">
    <div class="chat-screen">
      <div class="chat-header">
        <div class="chat-status-bar">
          <svg width="15" height="10" viewBox="0 0 15 10" fill="#101010">
            <rect x="0" y="5" width="2.5" height="5" rx="0.5"/>
            <rect x="3.5" y="3" width="2.5" height="7" rx="0.5"/>
            <rect x="7" y="1" width="2.5" height="9" rx="0.5"/>
            <rect x="10.5" y="0" width="2.5" height="10" rx="0.5"/>
          </svg>
          <svg width="16" height="12" viewBox="0 0 20 14" fill="none" stroke="#101010" stroke-width="1.5" stroke-linecap="round">
            <path d="M1 10C4 7 7 5.5 10 5.5C13 5.5 16 7 19 10"/>
            <path d="M4 12.5C6.5 10 8.5 9 10 9C11.5 9 13.5 10 16 12.5"/>
            <circle cx="10" cy="14" r="1.2" fill="#101010" stroke="none"/>
          </svg>
          <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
            <rect x="0.5" y="0.5" width="19" height="10" rx="2" stroke="#101010"/>
            <rect x="1.5" y="1.5" width="14" height="8" rx="1.5" fill="#101010"/>
            <path d="M20.5 3.5v4a2 2 0 0 0 0-4z" fill="#101010"/>
          </svg>
        </div>
        <div class="chat-top-bar-inner">
          <div style="width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="10" height="16" viewBox="0 0 10 16" fill="none" stroke="#101010" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 1 1 8 9 15"/>
            </svg>
          </div>
          <div class="chat-avatar-sm">BS</div>
          <span class="chat-contact-name">Brooklyn Simmons</span>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#101010">
            <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
          </svg>
        </div>
      </div>

      <div class="notification-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#686873" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;margin-top:1px">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span>This chat is monitored and recorded by the &lt;Brooklyns agency&gt;</span>
      </div>

      <div class="chat-messages">
        <!-- 1. Sent text -->
        <div class="msg-sent">
          <span class="msg-text">Hey! What a surprise! haha</span>
          <span class="msg-time">4:00 AM
            <svg width="16" height="10" viewBox="0 0 18 12" fill="none">
              <path d="M1 6L5 10L11 2" stroke="#7247EC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 6L10 10L16 2" stroke="#7247EC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
        <!-- 2. Received text -->
        <div class="msg-received">
          <span class="msg-text">Hey Darrell</span>
          <span class="msg-time msg-time-light">4:00 AM</span>
        </div>
        <!-- 3. Sent text message -->
        <div class="msg-sent">
          <span class="msg-text">Look what I found at the market today 🎃</span>
          <span class="msg-time">4:01 AM
            <svg width="16" height="10" viewBox="0 0 18 12" fill="none">
              <path d="M1 6L5 10L11 2" stroke="#7247EC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 6L10 10L16 2" stroke="#7247EC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
        <!-- 4. Sent photo -->
        <div class="msg-photo-wrap">
          <img src="https://picsum.photos/seed/kiwi-pumpkins/264/240" alt="Photo" />
          <div class="msg-photo-overlay">
            <span>4:01 AM</span>
            <svg width="16" height="10" viewBox="0 0 18 12" fill="none">
              <path d="M1 6L5 10L11 2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 6L10 10L16 2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <!-- 5. Received reply -->
        <div class="msg-received">
          <span class="msg-text">Wow these look amazing! 🤩 Where is that?</span>
          <span class="msg-time msg-time-light">4:03 AM</span>
        </div>
        <!-- 6. Sent voice message -->
        <div class="voice-bubble">
          <div class="voice-row">
            <div class="voice-play">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                <rect x="6" y="5" width="4" height="14" rx="1"/>
                <rect x="14" y="5" width="4" height="14" rx="1"/>
              </svg>
            </div>
            <div class="waveform">
              <div class="waveform-bar bar-played" style="height:5px"></div>
              <div class="waveform-bar bar-played" style="height:5px"></div>
              <div class="waveform-bar bar-played" style="height:13px"></div>
              <div class="waveform-bar bar-played" style="height:8px"></div>
              <div class="waveform-bar bar-played" style="height:11px"></div>
              <div class="waveform-bar bar-played" style="height:22px"></div>
              <div class="waveform-bar bar-played" style="height:13px"></div>
              <div class="waveform-bar bar-played" style="height:3px"></div>
              <div class="waveform-bar bar-played" style="height:5px"></div>
              <div class="waveform-bar bar-played" style="height:5px"></div>
              <div class="waveform-bar bar-played" style="height:27px"></div>
              <div class="waveform-bar bar-played" style="height:22px"></div>
              <div class="waveform-bar bar-played" style="height:13px"></div>
              <div class="waveform-bar bar-played" style="height:19px"></div>
              <div class="waveform-bar bar-played" style="height:13px"></div>
              <div class="waveform-bar bar-unplayed" style="height:5px"></div>
              <div class="waveform-bar bar-unplayed" style="height:5px"></div>
              <div class="waveform-bar bar-unplayed" style="height:11px"></div>
              <div class="waveform-bar bar-unplayed" style="height:16px"></div>
              <div class="waveform-bar bar-unplayed" style="height:22px"></div>
              <div class="waveform-bar bar-unplayed" style="height:16px"></div>
              <div class="waveform-bar bar-unplayed" style="height:27px"></div>
              <div class="waveform-bar bar-unplayed" style="height:22px"></div>
              <div class="waveform-bar bar-unplayed" style="height:16px"></div>
              <div class="waveform-bar bar-unplayed" style="height:3px"></div>
              <div class="waveform-bar bar-unplayed" style="height:5px"></div>
              <div class="waveform-bar bar-unplayed" style="height:11px"></div>
              <div class="waveform-bar bar-unplayed" style="height:22px"></div>
              <div class="waveform-bar bar-unplayed" style="height:13px"></div>
              <div class="waveform-bar bar-unplayed" style="height:6px"></div>
            </div>
          </div>
          <div class="voice-footer">
            <span class="voice-dur">0:04</span>
            <span class="msg-time">4:04 AM
              <svg width="16" height="10" viewBox="0 0 18 12" fill="none">
                <path d="M1 6L5 10L11 2" stroke="#7247EC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M6 6L10 10L16 2" stroke="#7247EC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>
        </div>
      </div>

      <div class="chat-input-bar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9191A1" stroke-width="1.5" stroke-linecap="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
        <span class="input-placeholder">Message</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7247EC" stroke-width="1.5" stroke-linecap="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7247EC" stroke-width="1.5" stroke-linecap="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
